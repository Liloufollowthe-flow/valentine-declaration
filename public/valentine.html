<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you be my dominatrix?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #fff5f5 50%, #fce4ec 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            color: #e91e63;
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .image-container {
            width: 300px;
            height: 300px;
            margin: 0 auto 50px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(233, 30, 99, 0.3);
            border: 4px solid #f8bbd9;
            position: relative;
        }

        .image-container img,
        .image-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.5s ease;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 25px;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .yes-btn-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 120px;
            min-height: 50px;
            transition: min-width 0.3s ease, min-height 0.3s ease;
        }

        @media (min-width: 640px) {
            .buttons {
                flex-direction: row;
                gap: 30px;
            }
        }

        button {
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .yes-btn {
            background: linear-gradient(135deg, #4ade80 0%, #10b981 100%);
            color: white;
            transform-origin: center;
        }

        .yes-btn:hover {
            background: linear-gradient(135deg, #22c55e 0%, #059669 100%);
            transform: scale(1.05);
        }

        .no-btn {
            background: linear-gradient(135deg, #ef5350 0%, #e53935 100%);
            color: white;
            font-size: 16px;
            white-space: nowrap;
        }

        .no-btn:hover {
            background: linear-gradient(135deg, #e53935 0%, #c62828 100%);
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }

        .success-bounce {
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .success .image-container {
            width: 360px;
            height: 360px;
        }

        .heart-text {
            font-size: 1.5rem;
            color: #e91e63;
            margin-bottom: 20px;
        }

        .replay-btn {
            background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
            color: white;
            margin-top: 20px;
        }

        .replay-btn:hover {
            background: linear-gradient(135deg, #db2777 0%, #e11d48 100%);
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }
            
            .image-container {
                width: 260px;
                height: 260px;
            }

            .success .image-container {
                width: 300px;
                height: 300px;
            }

            button {
                padding: 12px 25px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <h1 id="title">Artie Paints, will you be my dominatrix?</h1>
        
        <div class="image-container">
            <img id="gifImage" src="https://i.imgur.com/bQ27Fko.gif" alt="Please say yes">
        </div>

        <div class="buttons">
            <div class="yes-btn-wrapper" id="yesBtnWrapper">
                <button class="yes-btn" id="yesBtn" onclick="sayYes()">Yes</button>
            </div>
            <button class="no-btn" id="noBtn" onclick="sayNo()">No</button>
        </div>
    </div>

    <div class="container hidden" id="successContainer">
        <h1 class="success-bounce">YAY!!!</h1>
        <div class="image-container success-bounce">
            <video id="winVideo" autoplay loop muted playsinline>
                <source src="" type="video/mp4">
            </video>
        </div>
        <p class="heart-text success-bounce">You just made the happiest sub !!</p>
        <button class="replay-btn" onclick="replay()">Replay me !</button>
    </div>

    <script>
        let noCount = 0;
        let winVideoIndex = Math.floor(Math.random() * 3);

        // Preload all media on page load
        window.addEventListener('load', function() {
            const allGifs = [
                "https://i.imgur.com/bQ27Fko.gif",
                "https://i.imgur.com/3VU3OhT.gif",
                "https://c.tenor.com/73WoNZZmig8AAAAC/tenor.gif",
                "https://i.imgur.com/De4hihz.gif",
                "https://c.tenor.com/kkKmwSdyCLoAAAAd/tenor.gif",
                "https://i.imgur.com/psIop2e.gif",
                "https://c.tenor.com/r53R8b0im3kAAAAd/tenor.gif",
                "https://i.imgur.com/Q0NOE9Y.gif",
                "https://i.imgur.com/ZfAgQ18.gif",
                "https://i.imgur.com/yy8nNeK.gif",
                "https://i.imgur.com/8DRW3rf.gif",
                "https://c.tenor.com/Fqp2e-nCx5IAAAAC/tenor.gif",
                "https://i.imgur.com/5oDt8A6.gif",
                "https://i.imgur.com/u8dad12.gif",
                "https://i.imgur.com/6Dt48lj.gif"
            ];
            const allVideos = [
                "https://i.imgur.com/XyluJdU.mp4",
                "https://i.imgur.com/OPxPgSl.mp4",
                "https://i.imgur.com/a4pz1Ah.mp4"
            ];
            
            // Preload GIFs
            allGifs.forEach(src => {
                const img = new Image();
                img.src = src;
            });
            
            // Preload videos
            allVideos.forEach(src => {
                const video = document.createElement('video');
                video.preload = 'auto';
                video.src = src;
            });
        });

        const noButtonTexts = [
            "No",
            "Are you sure?",
            "What if I asked really nicely?",
            "Please Miss Paints, I'm begging you!!",
            "But I can't bear the pain of my broken heart!",
            "Could manage a broken ass tho 😉",
            "Fine !! Giving you my credit card!",
            "I'm kidding lol",
            "What about a traditional vietnamese pho?",
            "With a fine glass of Irish whiskey??",
            "Come on Miss Paints!",
            "Stop being a very silly goose",
            "Now.. only death shall cure my despair",
            "Oh, look, I'm DEAD now, congrats'",
            "You think ghosts can still lick feet?",
        ];

        const gifImages = [
            "https://i.imgur.com/bQ27Fko.gif",
            "https://i.imgur.com/3VU3OhT.gif",
            "https://c.tenor.com/73WoNZZmig8AAAAC/tenor.gif",
            "https://i.imgur.com/De4hihz.gif",
            "https://c.tenor.com/kkKmwSdyCLoAAAAd/tenor.gif",
            "https://i.imgur.com/psIop2e.gif",
            "https://c.tenor.com/r53R8b0im3kAAAAd/tenor.gif",
            "https://i.imgur.com/Q0NOE9Y.gif",
            "https://i.imgur.com/ZfAgQ18.gif",
            "https://c.tenor.com/m3xFoB9sKogAAAAd/tenor.gif",
            "https://i.imgur.com/8DRW3rf.gif",
            "https://c.tenor.com/Fqp2e-nCx5IAAAAC/tenor.gif",
            "https://c.tenor.com/ZAvEj5VJvBUAAAAd/tenor.gif",
            "https://i.imgur.com/u8dad12.gif",
            "https://i.imgur.com/6Dt48lj.gif"
        ];

        const winVideos = [
            "https://i.imgur.com/XyluJdU.mp4",
            "https://i.imgur.com/OPxPgSl.mp4",
            "https://i.imgur.com/a4pz1Ah.mp4"
        ];

        function sayNo() {
            noCount++;
            
            // Update image
            const imageIndex = Math.min(noCount, gifImages.length - 1);
            document.getElementById('gifImage').src = gifImages[imageIndex];

            // Grow Yes button
            const scale = 1 + noCount * 0.2;
            document.getElementById('yesBtn').style.transform = `scale(${scale})`;
            
            // Expand wrapper to accommodate growing button
            const wrapper = document.getElementById('yesBtnWrapper');
            wrapper.style.minWidth = `${Math.max(120, 120 * scale)}px`;
            wrapper.style.minHeight = `${Math.max(50, 50 * scale)}px`;

            // Update No button text
            const noTextIndex = Math.min(noCount, noButtonTexts.length - 1);
            document.getElementById('noBtn').textContent = noButtonTexts[noTextIndex];

            // Hide No button after all texts shown
            if (noCount >= noButtonTexts.length) {
                document.getElementById('noBtn').classList.add('hidden');
            }
        }

        function sayYes() {
            document.getElementById('mainContainer').classList.add('hidden');
            document.getElementById('successContainer').classList.remove('hidden');
            
            // Set random win video
            const video = document.getElementById('winVideo');
            video.src = winVideos[winVideoIndex];
            video.load();
            video.play();
        }

        function replay() {
            noCount = 0;
            winVideoIndex = Math.floor(Math.random() * 3);
            
            document.getElementById('successContainer').classList.add('hidden');
            document.getElementById('mainContainer').classList.remove('hidden');
            
            // Reset everything
            document.getElementById('gifImage').src = gifImages[0];
            document.getElementById('yesBtn').style.transform = 'scale(1)';
            document.getElementById('yesBtnWrapper').style.minWidth = '120px';
            document.getElementById('yesBtnWrapper').style.minHeight = '50px';
            document.getElementById('noBtn').textContent = 'No';
            document.getElementById('noBtn').classList.remove('hidden');
        }
    </script>
</body>
</html>
